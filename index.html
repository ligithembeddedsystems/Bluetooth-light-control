<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bluetooth LED Controller</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

h1{
    margin-bottom:30px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.on{
    background:limegreen;
    color:white;
}

.off{
    background:red;
    color:white;
}

</style>
</head>

<body>

<div class="box">

    <h1>Bluetooth LED Control</h1>

    <button class="on" onclick="startTone()">
        LED ON
    </button>

    <button class="off" onclick="stopTone()">
        LED OFF
    </button>

</div>

<script>

let audioContext = null;
let oscillator = null;
let gainNode = null;

function startTone(){

    // prevent multiple tones
    if(oscillator){
        return;
    }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    oscillator = audioContext.createOscillator();

    gainNode = audioContext.createGain();

    // tone type
    oscillator.type = "square";

    // frequency
    oscillator.frequency.setValueAtTime(
        200,
        audioContext.currentTime
    );

    // increase output strength
    gainNode.gain.setValueAtTime(
        1,
        audioContext.currentTime
    );

    oscillator.connect(gainNode);

    gainNode.connect(audioContext.destination);

    oscillator.start();

}

function stopTone(){

    if(oscillator){

        oscillator.stop();

        oscillator.disconnect();

        oscillator = null;

    }

    if(gainNode){

        gainNode.disconnect();

        gainNode = null;

    }

    // FULLY CLOSE AUDIO SYSTEM
    if(audioContext){

        audioContext.close();

        audioContext = null;

    }

}

</script>

</body>
</html>
