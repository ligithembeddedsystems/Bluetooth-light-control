<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Controlled Bluetooth LED</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.on{
    background:green;
    color:white;
}

.off{
    background:red;
    color:white;
}

.voice{
    background:blue;
    color:white;
}

#status{
    margin-top:20px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<h1>Voice LED Control</h1>

<button class="on" onclick="startTone()">
LED ON
</button>

<button class="off" onclick="stopTone()">
LED OFF
</button>

<button class="voice" onclick="startVoice()">
🎤 Voice Control
</button>

<div id="status">
Waiting...
</div>

</div>

<script>

let audioContext = null;
let oscillator = null;
let gainNode = null;

function startTone(){

    if(oscillator){
        return;
    }

    audioContext = new (
        window.AudioContext ||
        window.webkitAudioContext
    )();

    oscillator = audioContext.createOscillator();

    gainNode = audioContext.createGain();

    oscillator.type = "square";

    oscillator.frequency.setValueAtTime(
        200,
        audioContext.currentTime
    );

    gainNode.gain.setValueAtTime(
        1,
        audioContext.currentTime
    );

    oscillator.connect(gainNode);

    gainNode.connect(audioContext.destination);

    oscillator.start();

    document.getElementById("status").innerText =
    "LED ON";

}

function stopTone(){

    if(oscillator){

        oscillator.stop();

        oscillator.disconnect();

        oscillator = null;

    }

    if(gainNode){

        gainNode.disconnect();

        gainNode = null;

    }

    if(audioContext){

        audioContext.close();

        audioContext = null;

    }

    document.getElementById("status").innerText =
    "LED OFF";

}

function startVoice(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    const recognition =
        new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.start();

    document.getElementById("status").innerText =
    "Listening...";

    recognition.onresult = function(event){

        const command =
        event.results[0][0].transcript.toLowerCase();

        document.getElementById("status").innerText =
        "You said: " + command;

        if(command.includes("light on")){

            startTone();

        }

        if(command.includes("light off")){

            stopTone();

        }

    };

}

</script>

</body>
</html>
