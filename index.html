<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bluetooth LED Controller</title>

<style>
    body{
        background:#111;
        color:white;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .box{
        text-align:center;
        background:#1e1e1e;
        padding:40px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(255,255,255,0.1);
    }

    h1{
        margin-bottom:30px;
    }

    button{
        padding:15px 30px;
        margin:10px;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
    }

    .on{
        background:limegreen;
        color:white;
    }

    .off{
        background:red;
        color:white;
    }
</style>
</head>

<body>

<div class="box">
    <h1>Bluetooth LED Control</h1>

    <button class="on" onclick="startTone()">LED ON</button>

    <button class="off" onclick="stopTone()">LED OFF</button>
</div>

<script>

let audioContext;
let oscillator;

function startTone(){

    if(!audioContext){
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    oscillator = audioContext.createOscillator();

    oscillator.type = "sine";

    oscillator.frequency.setValueAtTime(200, audioContext.currentTime);

    oscillator.connect(audioContext.destination);

    oscillator.start();
}

function stopTone(){

    if(oscillator){
        oscillator.stop();
        oscillator.disconnect();
        oscillator = null;
    }
}

</script>

</body>
</html>
